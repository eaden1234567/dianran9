<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>方块消除大作战</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #121212;
            --grid-bg: #1e1e1e;
            --cell-empty: #2a2a2a;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .score-container {
            text-align: center;
        }

        .score-label { font-size: 14px; color: #aaa; }
        .score-value { font-size: 32px; font-weight: bold; color: #4ade80; }

        /* Grid Styling */
        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 4px;
            background-color: var(--grid-bg);
            padding: 8px;
            border-radius: 12px;
            aspect-ratio: 1 / 1;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .cell {
            background-color: var(--cell-empty);
            border-radius: 4px;
            transition: background-color 0.2s, transform 0.1s;
            position: relative;
        }

        .cell.highlight {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .cell.occupied {
            transform: scale(0.95);
        }

        /* Bottom Shapes Area */
        #shapes-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: auto;
            margin-bottom: 20px;
            height: 120px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 10px;
        }

        .shape-preview {
            width: 80px;
            height: 80px;
            display: grid;
            place-items: center;
            cursor: grab;
            transition: transform 0.2s;
        }

        .shape-preview:active {
            cursor: grabbing;
        }

        .shape-grid {
            display: grid;
            gap: 2px;
        }

        /* Drag and Drop Visuals */
        .dragging-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            opacity: 0.8;
            transform: scale(1.1);
        }

        /* Block Colors */
        .color-1 { background-color: #ff5e5e; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .color-2 { background-color: #4facfe; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .color-3 { background-color: #43e97b; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .color-4 { background-color: #f6d365; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .color-5 { background-color: #a18cd1; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .color-6 { background-color: #fa709a; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }

        .clearing {
            animation: pop 0.4s ease-out forwards;
        }

        @keyframes pop {
            0% { transform: scale(1); filter: brightness(1.5); }
            100% { transform: scale(0); opacity: 0; }
        }

        #game-over {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div class="score-container">
            <div class="score-label">当前分数</div>
            <div id="score" class="score-value">0</div>
        </div>
        <div class="score-container">
            <div class="score-label">最高记录</div>
            <div id="best-score" class="score-value">0</div>
        </div>
    </div>

    <div id="board"></div>

    <div id="shapes-container">
        <!-- 备选方块将通过JS生成 -->
    </div>
</div>

<div id="game-over">
    <h2 class="text-4xl font-bold mb-4">游戏结束</h2>
    <p class="text-xl mb-6">最终得分: <span id="final-score">0</span></p>
    <button onclick="resetGame()" class="bg-green-500 hover:bg-green-600 px-8 py-3 rounded-full text-white font-bold text-lg transition">
        重新开始
    </button>
</div>

<script>
    const BOARD_SIZE = 8;
    const boardElement = document.getElementById('board');
    const shapesContainer = document.getElementById('shapes-container');
    const scoreElement = document.getElementById('score');
    const bestScoreElement = document.getElementById('best-score');
    const gameOverScreen = document.getElementById('game-over');
    const finalScoreElement = document.getElementById('final-score');

    let score = 0;
    let bestScore = localStorage.getItem('blockBlastBest') || 0;
    let board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
    let currentShapes = [];
    let draggingShape = null;
    let dragGhost = null;

    // 方块定义
    const SHAPE_TYPES = [
        [[1, 1], [1, 1]], // 2x2 Square
        [[1]],             // 1x1 Dot
        [[1, 1, 1]],       // 1x3 Line
        [[1], [1], [1]],   // 3x1 Line
        [[1, 1, 1, 1]],    // 1x4 Line
        [[1, 0], [1, 0], [1, 1]], // L shape
        [[0, 1], [0, 1], [1, 1]], // J shape
        [[1, 1, 1], [0, 1, 0]],    // T shape
        [[1, 1, 0], [0, 1, 1]],    // Z shape
        [[1, 1], [1, 0], [1, 0]]   // Small L
    ];

    bestScoreElement.textContent = bestScore;

    function initBoard() {
        boardElement.innerHTML = '';
        for (let r = 0; r < BOARD_SIZE; r++) {
            for (let c = 0; c < BOARD_SIZE; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.row = r;
                cell.dataset.col = c;
                boardElement.appendChild(cell);
            }
        }
    }

    function renderBoard() {
        const cells = boardElement.querySelectorAll('.cell');
        cells.forEach(cell => {
            const r = parseInt(cell.dataset.row);
            const c = parseInt(cell.dataset.col);
            cell.className = 'cell';
            if (board[r][c] > 0) {
                cell.classList.add('occupied', `color-${board[r][c]}`);
            }
        });
    }

    function createRandomShape() {
        const typeIndex = Math.floor(Math.random() * SHAPE_TYPES.length);
        const color = Math.floor(Math.random() * 6) + 1;
        return {
            matrix: SHAPE_TYPES[typeIndex],
            color: color,
            id: Math.random().toString(36).substr(2, 9)
        };
    }

    function spawnShapes() {
        shapesContainer.innerHTML = '';
        currentShapes = [createRandomShape(), createRandomShape(), createRandomShape()];
        
        currentShapes.forEach((shape, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'shape-preview';
            wrapper.dataset.index = index;

            const grid = document.createElement('div');
            grid.className = 'shape-grid';
            grid.style.gridTemplateColumns = `repeat(${shape.matrix[0].length}, 1fr)`;
            
            shape.matrix.forEach(row => {
                row.forEach(val => {
                    const block = document.createElement('div');
                    block.style.width = '20px';
                    block.style.height = '20px';
                    block.className = val ? `color-${shape.color} rounded-sm` : '';
                    grid.appendChild(block);
                });
            });

            wrapper.appendChild(grid);
            shapesContainer.appendChild(wrapper);

            // 事件绑定
            wrapper.addEventListener('mousedown', (e) => startDrag(e, shape, index));
            wrapper.addEventListener('touchstart', (e) => startDrag(e, shape, index), {passive: false});
        });
    }

    function startDrag(e, shape, index) {
        e.preventDefault();
        draggingShape = { ...shape, index };
        
        const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;

        // 创建拖拽影子
        dragGhost = document.createElement('div');
        dragGhost.className = 'dragging-ghost shape-grid';
        dragGhost.style.gridTemplateColumns = `repeat(${shape.matrix[0].length}, 1fr)`;
        
        // 放大倍率：拖拽时方块大小应接近棋盘格子
        const cellSize = boardElement.offsetWidth / 8;
        
        shape.matrix.forEach(row => {
            row.forEach(val => {
                const block = document.createElement('div');
                block.style.width = (cellSize - 4) + 'px';
                block.style.height = (cellSize - 4) + 'px';
                block.style.margin = '2px';
                block.className = val ? `color-${shape.color} rounded-md` : '';
                dragGhost.appendChild(block);
            });
        });

        document.body.appendChild(dragGhost);
        moveGhost(clientX, clientY);

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);
    }

    function handleMove(e) {
        const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
        moveGhost(clientX, clientY);
        updateHighlight(clientX, clientY);
    }

    function moveGhost(x, y) {
        if (!dragGhost) return;
        // 向上偏移一点，防止手指遮挡
        dragGhost.style.left = (x - dragGhost.offsetWidth / 2) + 'px';
        dragGhost.style.top = (y - dragGhost.offsetHeight * 1.2) + 'px';
    }

    function updateHighlight(x, y) {
        clearHighlights();
        const target = getBoardPosition(x, y);
        if (target && canPlace(target.row, target.col, draggingShape.matrix)) {
            highlight(target.row, target.col, draggingShape.matrix);
        }
    }

    function getBoardPosition(x, y) {
        const rect = boardElement.getBoundingClientRect();
        // 考虑拖拽偏移
        const adjustedY = y - (dragGhost ? dragGhost.offsetHeight * 0.8 : 0);
        
        if (x < rect.left || x > rect.right || adjustedY < rect.top || adjustedY > rect.bottom) return null;
        
        const cellSize = rect.width / BOARD_SIZE;
        const col = Math.floor((x - rect.left) / cellSize);
        const row = Math.floor((adjustedY - rect.top) / cellSize);
        
        return { row, col };
    }

    function canPlace(r, c, matrix) {
        for (let i = 0; i < matrix.length; i++) {
            for (let j = 0; j < matrix[i].length; j++) {
                if (matrix[i][j]) {
                    const nr = r + i;
                    const nc = c + j;
                    if (nr >= BOARD_SIZE || nc >= BOARD_SIZE || board[nr][nc] !== 0) return false;
                }
            }
        }
        return true;
    }

    function highlight(r, c, matrix) {
        for (let i = 0; i < matrix.length; i++) {
            for (let j = 0; j < matrix[i].length; j++) {
                if (matrix[i][j]) {
                    const cell = boardElement.querySelector(`[data-row="${r+i}"][data-col="${c+j}"]`);
                    if (cell) cell.classList.add('highlight');
                }
            }
        }
    }

    function clearHighlights() {
        boardElement.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight'));
    }

    function endDrag(e) {
        const clientX = e.type === 'touchend' ? e.changedTouches[0].clientX : e.clientX;
        const clientY = e.type === 'touchend' ? e.changedTouches[0].clientY : e.clientY;
        
        const target = getBoardPosition(clientX, clientY);
        
        if (target && canPlace(target.row, target.col, draggingShape.matrix)) {
            placeShape(target.row, target.col, draggingShape);
        }

        if (dragGhost) {
            dragGhost.remove();
            dragGhost = null;
        }
        
        clearHighlights();
        window.removeEventListener('mousemove', handleMove);
        window.removeEventListener('touchmove', handleMove);
        window.removeEventListener('mouseup', endDrag);
        window.removeEventListener('touchend', endDrag);
        draggingShape = null;
    }

    function placeShape(r, c, shape) {
        const matrix = shape.matrix;
        for (let i = 0; i < matrix.length; i++) {
            for (let j = 0; j < matrix[i].length; j++) {
                if (matrix[i][j]) {
                    board[r + i][c + j] = shape.color;
                }
            }
        }
        
        // 移除备选区的形状
        const preview = shapesContainer.querySelector(`[data-index="${shape.index}"]`);
        preview.style.visibility = 'hidden';
        preview.style.pointerEvents = 'none';
        
        score += (matrix.flat().filter(v => v).length * 10);
        
        renderBoard();
        checkClearLines();
        
        // 检查备选区是否都用完了
        const remaining = Array.from(shapesContainer.children).filter(c => c.style.visibility !== 'hidden');
        if (remaining.length === 0) {
            spawnShapes();
        }

        if (!checkAnyMovePossible()) {
            gameOver();
        }
    }

    function checkClearLines() {
        let rowsToClear = [];
        let colsToClear = [];

        // Check rows
        for (let r = 0; r < BOARD_SIZE; r++) {
            if (board[r].every(cell => cell > 0)) rowsToClear.push(r);
        }

        // Check cols
        for (let c = 0; c < BOARD_SIZE; c++) {
            let colFull = true;
            for (let r = 0; r < BOARD_SIZE; r++) {
                if (board[r][c] === 0) { colFull = false; break; }
            }
            if (colFull) colsToClear.push(c);
        }

        if (rowsToClear.length > 0 || colsToClear.length > 0) {
            const bonus = (rowsToClear.length + colsToClear.length) * 100;
            score += bonus;
            
            // 动画处理
            rowsToClear.forEach(r => {
                for(let c=0; c<BOARD_SIZE; c++) {
                    const cell = boardElement.querySelector(`[data-row="${r}"][data-col="${c}"]`);
                    cell.classList.add('clearing');
                }
            });
            colsToClear.forEach(c => {
                for(let r=0; r<BOARD_SIZE; r++) {
                    const cell = boardElement.querySelector(`[data-row="${r}"][data-col="${c}"]`);
                    cell.classList.add('clearing');
                }
            });

            setTimeout(() => {
                rowsToClear.forEach(r => board[r].fill(0));
                colsToClear.forEach(c => {
                    for (let r = 0; r < BOARD_SIZE; r++) board[r][c] = 0;
                });
                renderBoard();
                updateScore();
            }, 400);
        }
        updateScore();
    }

    function updateScore() {
        scoreElement.textContent = score;
        if (score > bestScore) {
            bestScore = score;
            bestScoreElement.textContent = bestScore;
            localStorage.setItem('blockBlastBest', bestScore);
        }
    }

    function checkAnyMovePossible() {
        const remainingShapes = Array.from(shapesContainer.children)
            .filter(c => c.style.visibility !== 'hidden')
            .map(c => currentShapes[c.dataset.index]);

        if (remainingShapes.length === 0) return true;

        for (const shape of remainingShapes) {
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (canPlace(r, c, shape.matrix)) return true;
                }
            }
        }
        return false;
    }

            grid.className = 'shape-grid';
            grid.style.gridTemplateColumns = `repeat(${shape.matrix[0].length}, 1fr)`;
            
            shape.matrix.forEach(row => {
                row.forEach(val => {
                    const block = document.createElement('div');
                    block.style.width = '20px';
                    block.style.height = '20px';
                    block.className = val ? `color-${shape.color} rounded-sm` : '';
                    grid.appendChild(block);
                });
            });

            wrapper.appendChild(grid);
            shapesContainer.appendChild(wrapper);

            // 事件绑定
            wrapper.addEventListener('mousedown', (e) => startDrag(e, shape, index));
            wrapper.addEventListener('touchstart', (e) => startDrag(e, shape, index), {passive: false});
        });
    }

    function startDrag(e, shape, index) {
        e.preventDefault();
        draggingShape = { ...shape, index };
        
        const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;

        // 创建拖拽影子
        dragGhost = document.createElement('div');
        dragGhost.className = 'dragging-ghost shape-grid';
        dragGhost.style.gridTemplateColumns = `repeat(${shape.matrix[0].length}, 1fr)`;
        
        // 放大倍率：拖拽时方块大小应接近棋盘格子
        const cellSize = boardElement.offsetWidth / 8;
        
        shape.matrix.forEach(row => {
            row.forEach(val => {
                const block = document.createElement('div');
                block.style.width = (cellSize - 4) + 'px';
                block.style.height = (cellSize - 4) + 'px';
                block.style.margin = '2px';
                block.className = val ? `color-${shape.color} rounded-md` : '';
                dragGhost.appendChild(block);
            });
        });

        document.body.appendChild(dragGhost);
        moveGhost(clientX, clientY);

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);
    }

    function handleMove(e) {
        const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
        moveGhost(clientX, clientY);
        updateHighlight(clientX, clientY);
    }

    function moveGhost(x, y) {
        if (!dragGhost) return;
        // 向上偏移一点，防止手指遮挡
        dragGhost.style.left = (x - dragGhost.offsetWidth / 2) + 'px';
        dragGhost.style.top = (y - dragGhost.offsetHeight * 1.2) + 'px';
    }

    function updateHighlight(x, y) {
        clearHighlights();
        const target = getBoardPosition(x, y);
        if (target && canPlace(target.row, target.col, draggingShape.matrix)) {
            highlight(target.row, target.col, draggingShape.matrix);
        }
    }

    function getBoardPosition(x, y) {
        const rect = boardElement.getBoundingClientRect();
        // 考虑拖拽偏移
        const adjustedY = y - (dragGhost ? dragGhost.offsetHeight * 0.8 : 0);
        
        if (x < rect.left || x > rect.right || adjustedY < rect.top || adjustedY > rect.bottom) return null;
        
        const cellSize = rect.width / BOARD_SIZE;
        const col = Math.floor((x - rect.left) / cellSize);
        const row = Math.floor((adjustedY - rect.top) / cellSize);
        
        return { row, col };
    }

    function canPlace(r, c, matrix) {
        for (let i = 0; i < matrix.length; i++) {
            for (let j = 0; j < matrix[i].length; j++) {
                if (matrix[i][j]) {
                    const nr = r + i;
                    const nc = c + j;
                    if (nr >= BOARD_SIZE || nc >= BOARD_SIZE || board[nr][nc] !== 0) return false;
                }
            }
        }
        return true;
    }

    function highlight(r, c, matrix) {
        for (let i = 0; i < matrix.length; i++) {
            for (let j = 0; j < matrix[i].length; j++) {
                if (matrix[i][j]) {
                    const cell = boardElement.querySelector(`[data-row="${r+i}"][data-col="${c+j}"]`);
                    if (cell) cell.classList.add('highlight');
                }
            }
        }
    }

    function clearHighlights() {
        boardElement.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight'));
    }

    function endDrag(e) {
        const clientX = e.type === 'touchend' ? e.changedTouches[0].clientX : e.clientX;
        const clientY = e.type === 'touchend' ? e.changedTouches[0].clientY : e.clientY;
        
        const target = getBoardPosition(clientX, clientY);
        
        if (target && canPlace(target.row, target.col, draggingShape.matrix)) {
            placeShape(target.row, target.col, draggingShape);
        }

        if (dragGhost) {
            dragGhost.remove();
            dragGhost = null;
        }
        
        clearHighlights();
        window.removeEventListener('mousemove', handleMove);
        window.removeEventListener('touchmove', handleMove);
        window.removeEventListener('mouseup', endDrag);
        window.removeEventListener('touchend', endDrag);
        draggingShape = null;
    }

    function placeShape(r, c, shape) {
        const matrix = shape.matrix;
        for (let i = 0; i < matrix.length; i++) {
            for (let j = 0; j < matrix[i].length; j++) {
                if (matrix[i][j]) {
                    board[r + i][c + j] = shape.color;
                }
            }
        }
        
        // 移除备选区的形状
        const preview = shapesContainer.querySelector(`[data-index="${shape.index}"]`);
        preview.style.visibility = 'hidden';
        preview.style.pointerEvents = 'none';
        
        score += (matrix.flat().filter(v => v).length * 10);
        
        renderBoard();
        checkClearLines();
        
        // 检查备选区是否都用完了
        const remaining = Array.from(shapesContainer.children).filter(c => c.style.visibility !== 'hidden');
        if (remaining.length === 0) {
            spawnShapes();
        }

        if (!checkAnyMovePossible()) {
            gameOver();
        }
    }

    function checkClearLines() {
        let rowsToClear = [];
        let colsToClear = [];

        // Check rows
        for (let r = 0; r < BOARD_SIZE; r++) {
            if (board[r].every(cell => cell > 0)) rowsToClear.push(r);
        }

        // Check cols
        for (let c = 0; c < BOARD_SIZE; c++) {
            let colFull = true;
            for (let r = 0; r < BOARD_SIZE; r++) {
                if (board[r][c] === 0) { colFull = false; break; }
            }
            if (colFull) colsToClear.push(c);
        }

        if (rowsToClear.length > 0 || colsToClear.length > 0) {
            const bonus = (rowsToClear.length + colsToClear.length) * 100;
            score += bonus;
            
            // 动画处理
            rowsToClear.forEach(r => {
                for(let c=0; c<BOARD_SIZE; c++) {
                    const cell = boardElement.querySelector(`[data-row="${r}"][data-col="${c}"]`);
                    cell.classList.add('clearing');
                }
            });
            colsToClear.forEach(c => {
                for(let r=0; r<BOARD_SIZE; r++) {
                    const cell = boardElement.querySelector(`[data-row="${r}"][data-col="${c}"]`);
                    cell.classList.add('clearing');
                }
            });

            setTimeout(() => {
                rowsToClear.forEach(r => board[r].fill(0));
                colsToClear.forEach(c => {
                    for (let r = 0; r < BOARD_SIZE; r++) board[r][c] = 0;
                });
                renderBoard();
                updateScore();
            }, 400);
        }
        updateScore();
    }

    function updateScore() {
        scoreElement.textContent = score;
        if (score > bestScore) {
            bestScore = score;
            bestScoreElement.textContent = bestScore;
            localStorage.setItem('blockBlastBest', bestScore);
        }
    }

    function checkAnyMovePossible() {
        const remainingShapes = Array.from(shapesContainer.children)
            .filter(c => c.style.visibility !== 'hidden')
            .map(c => currentShapes[c.dataset.index]);

        if (remainingShapes.length === 0) return true;

        for (const shape of remainingShapes) {
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (canPlace(r, c, shape.matrix)) return true;
                }
            }
        }
        return false;
    }

    function gameOver() {
        finalScoreElement.textContent = score;
        gameOverScreen.style.display = 'flex';
    }

    function resetGame() {
        score = 0;
        updateScore();
        board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        gameOverScreen.style.display = 'none';
        initBoard();
        renderBoard();
        spawnShapes();
    }

    // 初始化
    initBoard();
    spawnShapes();

</script>
</body>
</html>
